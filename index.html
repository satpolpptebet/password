<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Pindah</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      position:relative;
    }

    /* Gelembung */
    .bubble{
      position:absolute;
      bottom:-120px;
      background: rgba(255,255,255,0.25);
      border-radius:50%;
      animation: naik linear infinite;
      backdrop-filter: blur(3px);
    }

    .bubble:nth-child(1){
      width:80px;
      height:80px;
      left:10%;
      animation-duration:15s;
    }

    .bubble:nth-child(2){
      width:40px;
      height:40px;
      left:25%;
      animation-duration:12s;
      animation-delay:2s;
    }

    .bubble:nth-child(3){
      width:100px;
      height:100px;
      left:45%;
      animation-duration:18s;
      animation-delay:1s;
    }

    .bubble:nth-child(4){
      width:60px;
      height:60px;
      left:65%;
      animation-duration:14s;
      animation-delay:3s;
    }

    .bubble:nth-child(5){
      width:120px;
      height:120px;
      left:85%;
      animation-duration:20s;
    }

    @keyframes naik{
      0%{
        transform: translateY(0) scale(1);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform: translateY(-120vh) scale(1.2);
        opacity:0;
      }
    }

    /* Card */
    .card{
      position:relative;
      z-index:10;
      width:90%;
      max-width:550px;
      padding:45px;
      border-radius:25px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 35px rgba(0,0,0,0.15);
      text-align:center;
      color:white;
    }

    .card h1{
      font-size:38px;
      margin-bottom:20px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
    }

    .card p{
      font-size:18px;
      line-height:1.7;
      margin-bottom:30px;
    }

    .btn{
      display:inline-block;
      padding:14px 30px;
      border-radius:50px;
      background:white;
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
      font-size:18px;
      transition:0.3s ease;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    .btn:hover{
      transform:translateY(-3px) scale(1.05);
      background:#2563eb;
      color:white;
    }

    .link-text{
      margin-top:18px;
      font-size:14px;
      opacity:0.9;
      word-break:break-word;
    }

  </style>
</head>
<body>

  <!-- Gelembung -->
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <!-- Card -->
  <div class="card">
    <h1>Website Telah Pindah</h1>

    <p>
      Website ini telah berpindah ke alamat baru.
      <br>
      Silakan klik tombol di bawah untuk menuju website terbaru.
    </p>

    <a class="btn" 
       href="https://www.satpolpptebet.my.id" 
       target="_blank">
       Kunjungi Website Baru
    </a>

    <div class="link-text">
      www.satpolpptebet.my.id
    </div>
  </div>

</body>
</html>
